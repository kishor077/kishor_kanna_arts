<!DOCTYPE html>
<html>
<head>
    <title>Place Custom Art Order | Kishor Kanna Arts</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background:#0f0f0f; color:white; padding:50px; text-align:center;">

<h2 style="color:#d4af37;">Place Your Custom Art Order</h2>

<form action="https://formsubmit.co/kishorarts4g@gmail.com" method="POST" style="max-width:500px; margin:auto;">

    <input type="text" name="name" placeholder="Your Name" required
    style="width:100%; padding:12px; margin:10px 0;">

    <input type="tel" name="phone" placeholder="Phone Number" required
    style="width:100%; padding:12px; margin:10px 0;">

    <select name="art_type" style="width:100%; padding:12px; margin:10px 0;">
        <option>Blood Art</option>
        <option>Pencil Sketch</option>
        <option>Canvas Painting</option>
        <option>Custom Gift Art</option>
    </select>

    <textarea name="details" placeholder="Describe Your Order"
    style="width:100%; padding:12px; margin:10px 0;"></textarea>

    <button type="submit" class="btn">Submit Order</button>

</form>

</body>
</html>
